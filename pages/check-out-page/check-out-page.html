<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <include id="header" src="../../companents/header/header-companent.html"></include>

    <main class="max-w-[1200px] mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
            <form class="space-y-3">
                <div>
                    <label class="text-xs">First name</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">Last name</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">State</label>
                    <select class="w-full h-8 border border-gray-200 rounded px-2 outline-none">
                        <option>Choose...</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs">City</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">Address</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">Zip</label>
                    <input class="w-28 h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">Tel</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div>
                    <label class="text-xs">Email</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <label class="flex items-center gap-2 text-xs">
                    <input type="checkbox" />
                    Agree to terms and conditions
                </label>
            </form>

            <section>
                <div class="flex items-center gap-4 mb-8">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-6" />
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-7" />
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg"
                        class="h-7" />
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Discover_Card_logo.svg" class="h-7" />
                </div>

                <div class="mb-5">
                    <label class="text-xs">Card number</label>
                    <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                </div>

                <div class="grid grid-cols-3 gap-5 mb-10">
                    <div>
                        <label class="text-xs">Expiration(MM)</label>
                        <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                    </div>

                    <div>
                        <label class="text-xs">Expiration(YY)</label>
                        <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                    </div>

                    <div>
                        <label class="text-xs">Card security code</label>
                        <input class="w-full h-8 border border-gray-200 rounded px-2 outline-none" />
                    </div>
                </div>

                <div class="text-[20px]">
                    <div class="flex justify-between border-b border-gray-300 py-3">
                        <span>Subtotal</span>
                        <span>189.96999999999997$</span>
                    </div>

                    <div class="flex justify-between border-b border-gray-300 py-3">
                        <span>Shipping</span>
                        <span>FREE</span>
                    </div>

                    <div class="flex justify-between border-b border-gray-300 py-3">
                        <span>Total</span>
                        <span>189.96999999999997$</span>
                    </div>
                </div>

                <div class="flex justify-end mt-10">
                    <button class="bg-[#db4444] text-white px-10 py-4 rounded">
                        Place order
                    </button>
                </div>
            </section>
        </div>
    </main>

    <include id="footer" src="../../companents/footer/footer-companent.html"></include>

    <script type="module" src="../../utils/include.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>

</html>
